<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remitos - B-P Sanitarios</title>
  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{margin:0;background:#f3f3f3;color:#fff}
    .container{max-width:1200px;margin:30px auto;padding:20px}
    h1{text-align:center;color:#111;font-size:46px;margin:0 0 8px;font-weight:700}
    .subtitulo{text-align:center;color:#555;font-size:28px;margin:0 0 25px;font-weight:700}
    .card{background:#1b1b1b;border-radius:12px;padding:18px;margin-bottom:20px;border:1px solid #2b2b2b}
    h2,h3{margin:0 0 14px;color:#fff}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    input{width:100%;padding:10px;border-radius:6px;border:1px solid #333;background:#fff;color:#000}
    input:focus{border-color:#ff2b2b;outline:none}
    button{border:none;border-radius:6px;padding:10px 14px;cursor:pointer;font-weight:bold}
    .btn-primary{background:#ff2b2b;color:#fff}
    .btn-success{background:#28a745;color:#fff}
    .btn-danger{background:#c82333;color:#fff}
    .btn-secondary{background:#444;color:#fff}
    .btn-logout{background:#444;color:#fff}
    .top-actions{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:15px}
    .top-actions a{text-decoration:none}
    .nav-actions{display:flex;gap:10px;flex-wrap:wrap}
    table{width:100%;border-collapse:collapse;margin-top:10px;background:#fff;color:#000;border-radius:10px;overflow:hidden}
    th,td{padding:12px;border-bottom:1px solid #ddd;text-align:left;vertical-align:middle}
    th{background:#ff2b2b;color:#fff}
    tr:hover{background:#f5f5f5}
    .row-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .small-input{width:90px;padding:8px;background:#fff;border:1px solid #333;color:#000}
    .mensaje{margin-top:10px;font-weight:bold;min-height:22px}
    .mensaje.ok{color:#00ff88}.mensaje.error{color:#ff6666}
    .empty{text-align:center;color:#666;padding:20px 0}
    .muted{color:#666}
    .login-wrapper{max-width:520px;margin:60px auto;padding:20px}
    .login-card{background:#1b1b1b;border-radius:12px;padding:25px;border:1px solid #2b2b2b;box-shadow:0 8px 20px rgba(0,0,0,.15)}
    .login-title{text-align:center;color:#111;font-size:46px;margin-bottom:8px;font-weight:bold}
    .login-subtitle{text-align:center;color:#555;font-size:24px;margin-bottom:25px;font-weight:bold}
    .login-card .grid{grid-template-columns:1fr}
    .login-error{margin-top:12px;text-align:center;font-weight:bold;color:#ff5555;min-height:20px}
    .remito-actions{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap}
    .remito-tools{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;align-items:end}
    .remito-preview{margin-top:14px;padding:14px;border-radius:10px;background:#fff;color:#000;border:1px solid #ddd;display:none}
    .remito-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px 14px;margin-bottom:12px}
    .recent-remitos{display:grid;gap:10px}
    .recent-item{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px;color:#000;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}
    .estado-activo{color:#008f4c;font-weight:bold}.estado-anulado{color:#d60000;font-weight:bold}
    @media (max-width: 900px){
      h1{font-size:36px}
      .subtitulo{font-size:22px}
      .login-title{font-size:34px}
      .login-subtitle{font-size:20px}
      .top-actions{justify-content:center}
      table,thead,tbody,th,td,tr{display:block}
      thead{display:none}
      tr{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px;margin-bottom:12px}
      td{border:none;padding:8px 0}
      td::before{content:attr(data-label);display:block;font-weight:bold;color:#111;margin-bottom:4px}
      .small-input{width:100%}
    }
  </style>
</head>
<body>
  <div id="loginBox" class="login-wrapper" style="display:none;">
    <div class="login-title">B-P Sanitarios</div>
    <div class="login-subtitle">Panel de remitos</div>
    <div class="login-card">
      <h2>Iniciar sesión</h2>
      <div class="grid">
        <input type="email" id="email" placeholder="Correo electrónico" />
        <input type="password" id="password" placeholder="Contraseña" />
      </div>
      <div style="margin-top:16px;text-align:center;">
        <button class="btn-primary" onclick="login()">Ingresar</button>
      </div>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <div id="app" style="display:none;">
    <div class="container">
      <h1>B-P Sanitarios</h1>
      <div class="subtitulo">Remitos</div>

      <div class="top-actions">
        <div class="nav-actions">
 <a href="index.html"><button class="btn-secondary" type="button">Ir a Inicio</button></a>
          <a href="productos.html"><button class="btn-secondary" type="button">Ir a productos</button></a>
        </div>
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar sesión</button>
      </div>

      <div class="card">
        <h2>Datos del cliente</h2>
        <div class="grid">
          <input type="text" id="clienteNombre" placeholder="Nombre o razón social" />
          <input type="text" id="clienteDireccion" placeholder="Dirección" />
          <input type="text" id="clienteCuit" placeholder="CUIT" />
        </div>
        <div class="remito-actions">
          <button class="btn-success" onclick="generarRemito()">Generar remito</button>
          <button class="btn-secondary" onclick="vaciarCarrito()">Vaciar carrito</button>
        </div>
        <div id="mensaje" class="mensaje"></div>
      </div>

      <div class="card">
        <h2>Carrito actual</h2>
        <table>
          <thead>
            <tr>
              <th>Cantidad</th>
              <th>Código</th>
              <th>Descripción</th>
              <th>Unitario</th>
              <th>Total</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaCarrito"></tbody>
        </table>
        <div id="carritoVacio" class="empty">No hay productos agregados al remito.</div>
        <div style="margin-top:12px;font-weight:bold;color:white;text-align:right;">
          Total general: <span id="totalGeneralRemito">$0,00</span>
        </div>
      </div>

      <div class="card">
        <h2>Consultar / anular remito</h2>
        <div class="remito-tools">
          <input type="number" id="remitoNumeroBuscar" placeholder="Número de remito" min="1" />
          <button class="btn-secondary" onclick="verRemito()">Ver remito</button>
          <button class="btn-danger" onclick="anularRemitoSeleccionado()">Anular remito</button>
          <button class="btn-success" onclick="emitirRemito()">Emitir remito</button>
        </div>
        <div id="remitoPreview" class="remito-preview"></div>
      </div>

      <div class="card">
        <h2>Últimos remitos</h2>
        <div id="listaUltimosRemitos" class="recent-remitos">
          <div class="muted">Todavía no hay remitos guardados.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, get, onValue, off, update, runTransaction } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCtn8b4kpU616tgH56Gw-NDH0o5zLDn48Q",
      authDomain: "bpsanitariossrl.firebaseapp.com",
      databaseURL: "https://bpsanitariossrl-default-rtdb.firebaseio.com",
      projectId: "bpsanitariossrl",
      storageBucket: "bpsanitariossrl.firebasestorage.app",
      messagingSenderId: "761286267293",
      appId: "1:761286267293:web:bfe8bf3e25a9fe22621f74",
      measurementId: "G-BMJXXK58E2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const productosRef = ref(db, 'stockPorMarca');
    const remitosRef = ref(db, 'remitos');
    const contadorRemitosRef = ref(db, 'configuracion/ultimoNumeroRemito');

    let productos = [];
    let carrito = [];
    let remitoSeleccionado = null;
    let listenerProductosActivo = false;
    let listenerRemitosActivo = false;

    function moneda(valor){
      return new Intl.NumberFormat('es-AR', { style:'currency', currency:'ARS' }).format(Number(valor || 0));
    }

    function mostrarMensaje(texto, tipo='ok'){
      const el = document.getElementById('mensaje');
      if(!el) return;
      el.className = 'mensaje ' + tipo;
      el.textContent = texto;
      clearTimeout(window.__msgTimer);
      window.__msgTimer = setTimeout(() => {
        el.className = 'mensaje';
        el.textContent = '';
      }, 3500);
    }

    function mostrarErrorLogin(texto){
      const el = document.getElementById('loginError');
      if (el) el.textContent = texto;
    }

    function guardarCarrito(){
      localStorage.setItem('bp_carrito', JSON.stringify(carrito));
    }

    function cargarCarrito(){
      try{
        carrito = JSON.parse(localStorage.getItem('bp_carrito')) || [];
      }catch(error){
        carrito = [];
      }
    }

    function formatearFecha(fechaIso){
      if(!fechaIso) return '-';
      const fecha = new Date(fechaIso);
      return Number.isNaN(fecha.getTime()) ? fechaIso : fecha.toLocaleString('es-AR');
    }

    function formatearNumeroRemito(numero){
      return String(Number(numero || 0)).padStart(6, '0');
    }

    function limpiarVistaRemito(){
      remitoSeleccionado = null;
      const preview = document.getElementById('remitoPreview');
      preview.style.display = 'none';
      preview.innerHTML = '';
    }

    function renderCarrito(){
      const tbody = document.getElementById('tablaCarrito');
      const vacio = document.getElementById('carritoVacio');
      const totalEl = document.getElementById('totalGeneralRemito');

      if(!carrito.length){
        tbody.innerHTML = '';
        vacio.style.display = 'block';
        totalEl.textContent = moneda(0);
        return;
      }

      vacio.style.display = 'none';
      let totalGeneral = 0;
      tbody.innerHTML = carrito.map((item, index) => {
        const total = Number(item.cantidad || 0) * Number(item.precio || 0);
        totalGeneral += total;
        return `
          <tr>
            <td data-label="Cantidad">${Number(item.cantidad || 0)}</td>
            <td data-label="Código">${item.codigo || '-'}</td>
            <td data-label="Descripción">${item.nombre || '-'}</td>
            <td data-label="Unitario">${moneda(item.precio)}</td>
            <td data-label="Total">${moneda(total)}</td>
            <td data-label="Acciones">
              <div class="row-actions">
                <input class="small-input" type="number" min="1" value="${Number(item.cantidad || 0)}" id="cant-${index}" />
                <button class="btn-secondary" onclick="actualizarCantidadCarrito(${index})">Guardar</button>
                <button class="btn-danger" onclick="eliminarDelCarrito(${index})">Quitar</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      totalEl.textContent = moneda(totalGeneral);
    }

    function vaciarCarrito(){
      carrito = [];
      guardarCarrito();
      renderCarrito();
      mostrarMensaje('Carrito vaciado.', 'ok');
    }

    function obtenerProductoPorId(id){
      return productos.find(item => item.id === id);
    }

    function actualizarCantidadCarrito(index){
      const nuevaCantidad = Number(document.getElementById(`cant-${index}`).value);
      const item = carrito[index];
      if(!item || !nuevaCantidad || nuevaCantidad <= 0){
        mostrarMensaje('Indicá una cantidad válida.', 'error');
        return;
      }
      const producto = obtenerProductoPorId(item.id);
      if(producto && nuevaCantidad > Number(producto.cantidad || 0)){
        mostrarMensaje('La cantidad supera el stock disponible.', 'error');
        return;
      }
      carrito[index].cantidad = nuevaCantidad;
      guardarCarrito();
      renderCarrito();
      mostrarMensaje('Cantidad actualizada.', 'ok');
    }

    function eliminarDelCarrito(index){
      carrito.splice(index, 1);
      guardarCarrito();
      renderCarrito();
      mostrarMensaje('Producto quitado del carrito.', 'ok');
    }

    async function obtenerSiguienteNumeroRemito(){
      const resultado = await runTransaction(contadorRemitosRef, (actual) => Number(actual || 0) + 1);
      return Number(resultado.snapshot.val() || 1);
    }

    async function descontarStockPorCarrito(){
      for (const item of carrito) {
        const producto = obtenerProductoPorId(item.id);
        if (!producto) throw new Error(`No se encontró el producto ${item.nombre}.`);
        const stockActual = Number(producto.cantidad || 0);
        const cantidad = Number(item.cantidad || 0);
        if (cantidad > stockActual) throw new Error(`Stock insuficiente para ${item.nombre}.`);
        await update(ref(db, `stockPorMarca/${item.id}`), { cantidad: stockActual - cantidad });
      }
    }

    async function reponerStockDeRemito(remito){
      for (const item of (remito.items || [])) {
        const producto = obtenerProductoPorId(item.id);
        const stockActual = Number(producto?.cantidad || 0);
        const cantidad = Number(item.cantidad || 0);
        await update(ref(db, `stockPorMarca/${item.id}`), { cantidad: stockActual + cantidad });
      }
    }

    function generarPdfRemito(remito){
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      let y = 18;

      doc.setFontSize(18);
      doc.text('B-P Sanitarios', 14, y);
      y += 8;
      doc.setFontSize(12);
      doc.text(`Remito N° ${formatearNumeroRemito(remito.numero)}`, 14, y);
      y += 7;
      doc.text(`Fecha: ${formatearFecha(remito.fechaIso)}`, 14, y);
      y += 10;
      doc.text(`Cliente: ${remito.clienteNombre || '-'}`, 14, y);
      y += 7;
      doc.text(`Dirección: ${remito.clienteDireccion || '-'}`, 14, y);
      y += 7;
      doc.text(`CUIT: ${remito.clienteCuit || '-'}`, 14, y);
      y += 12;

      doc.setFontSize(11);
      doc.text('Cant.', 14, y);
      doc.text('Código', 34, y);
      doc.text('Descripción', 68, y);
      doc.text('P. Unit.', 148, y, { align: 'right' });
      doc.text('Total', 196, y, { align: 'right' });
      y += 4;
      doc.line(14, y, 196, y);
      y += 8;

      let totalGeneral = 0;
      (remito.items || []).forEach((item) => {
        const total = Number(item.cantidad || 0) * Number(item.precio || 0);
        totalGeneral += total;
        if (y > 270) {
          doc.addPage();
          y = 20;
        }
        doc.text(String(item.cantidad || 0), 14, y);
        doc.text(String(item.codigo || '-'), 34, y);
        doc.text(String(item.nombre || '-').slice(0, 52), 68, y);
        doc.text(moneda(item.precio), 148, y, { align: 'right' });
        doc.text(moneda(total), 196, y, { align: 'right' });
        y += 8;
      });

      y += 4;
      doc.line(14, y, 196, y);
      y += 10;
      doc.setFontSize(13);
      doc.text(`Total general: ${moneda(totalGeneral)}`, 196, y, { align: 'right' });
      doc.save(`remito-${formatearNumeroRemito(remito.numero)}.pdf`);
    }

    async function generarRemito(){
      const clienteNombre = document.getElementById('clienteNombre').value.trim();
      const clienteDireccion = document.getElementById('clienteDireccion').value.trim();
      const clienteCuit = document.getElementById('clienteCuit').value.trim();

      if(!clienteNombre){
        mostrarMensaje('Completá al menos el nombre del cliente.', 'error');
        return;
      }
      if(!carrito.length){
        mostrarMensaje('El carrito está vacío.', 'error');
        return;
      }

      try{
        await descontarStockPorCarrito();
        const numero = await obtenerSiguienteNumeroRemito();
        const fechaIso = new Date().toISOString();
        const remito = {
          numero,
          fechaIso,
          estado: 'activo',
          clienteNombre,
          clienteDireccion,
          clienteCuit,
          items: carrito.map(item => ({ ...item }))
        };
        await update(ref(db, `remitos/${numero}`), remito);
        generarPdfRemito(remito);
        carrito = [];
        guardarCarrito();
        renderCarrito();
        document.getElementById('clienteNombre').value = '';
        document.getElementById('clienteDireccion').value = '';
        document.getElementById('clienteCuit').value = '';
        mostrarMensaje(`Remito ${formatearNumeroRemito(numero)} generado correctamente.`, 'ok');
      }catch(error){
        console.error(error);
        mostrarMensaje(error.message || 'No se pudo generar el remito.', 'error');
      }
    }

    function renderPreviewRemito(remito){
      const preview = document.getElementById('remitoPreview');
      const total = (remito.items || []).reduce((acc, item) => acc + Number(item.cantidad || 0) * Number(item.precio || 0), 0);
      preview.innerHTML = `
        <div class="remito-meta">
          <div><strong>Número:</strong> ${formatearNumeroRemito(remito.numero)}</div>
          <div><strong>Fecha:</strong> ${formatearFecha(remito.fechaIso)}</div>
          <div><strong>Estado:</strong> <span class="${remito.estado === 'anulado' ? 'estado-anulado' : 'estado-activo'}">${remito.estado || 'activo'}</span></div>
          <div><strong>Cliente:</strong> ${remito.clienteNombre || '-'}</div>
          <div><strong>Dirección:</strong> ${remito.clienteDireccion || '-'}</div>
          <div><strong>CUIT:</strong> ${remito.clienteCuit || '-'}</div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Cant.</th>
              <th>Código</th>
              <th>Descripción</th>
              <th>Unitario</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody>
            ${(remito.items || []).map(item => `
              <tr>
                <td data-label="Cant.">${Number(item.cantidad || 0)}</td>
                <td data-label="Código">${item.codigo || '-'}</td>
                <td data-label="Descripción">${item.nombre || '-'}</td>
                <td data-label="Unitario">${moneda(item.precio)}</td>
                <td data-label="Total">${moneda(Number(item.cantidad || 0) * Number(item.precio || 0))}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div style="margin-top:12px;text-align:right;font-weight:bold;">Total general: ${moneda(total)}</div>
      `;
      preview.style.display = 'block';
    }

    async function verRemito(){
      const numero = Number(document.getElementById('remitoNumeroBuscar').value);
      if(!numero){
        mostrarMensaje('Indicá un número de remito.', 'error');
        return;
      }
      try{
        const snapshot = await get(ref(db, `remitos/${numero}`));
        if(!snapshot.exists()){
          limpiarVistaRemito();
          mostrarMensaje('No se encontró ese remito.', 'error');
          return;
        }
        remitoSeleccionado = snapshot.val();
        renderPreviewRemito(remitoSeleccionado);
      }catch(error){
        console.error(error);
        mostrarMensaje('No se pudo consultar el remito.', 'error');
      }
    }

    async function cargarRemitoDesdeLista(numero){
      document.getElementById('remitoNumeroBuscar').value = Number(numero || 0);
      await verRemito();
    }

    async function anularRemitoSeleccionado(){
      if(!remitoSeleccionado){
        mostrarMensaje('Primero buscá o abrí un remito.', 'error');
        return;
      }
      if(remitoSeleccionado.estado === 'anulado'){
        mostrarMensaje('Ese remito ya está anulado.', 'error');
        return;
      }
      const confirmar = confirm(`¿Anular remito ${formatearNumeroRemito(remitoSeleccionado.numero)}?`);
      if(!confirmar) return;
      try{
        await reponerStockDeRemito(remitoSeleccionado);
        await update(ref(db, `remitos/${remitoSeleccionado.numero}`), { estado: 'anulado', fechaAnulacionIso: new Date().toISOString() });
        remitoSeleccionado.estado = 'anulado';
        renderPreviewRemito(remitoSeleccionado);
        mostrarMensaje('Remito anulado y stock repuesto.', 'ok');
      }catch(error){
        console.error(error);
        mostrarMensaje('No se pudo anular el remito.', 'error');
      }
    }

    function activarLecturaProductos(){
      if(listenerProductosActivo) return;
      listenerProductosActivo = true;
      onValue(productosRef, (snapshot) => {
        const data = snapshot.val() || {};
        productos = Object.entries(data).map(([id, item]) => ({ id, ...item }));
      });
    }

    function activarLecturaRemitos(){
      if(listenerRemitosActivo) return;
      listenerRemitosActivo = true;
      onValue(remitosRef, (snapshot) => {
        const data = snapshot.val() || {};
        const lista = Object.values(data)
          .sort((a, b) => Number(b.numero || 0) - Number(a.numero || 0))
          .slice(0, 10);

        const contenedor = document.getElementById('listaUltimosRemitos');
        if (!lista.length) {
          contenedor.innerHTML = '<div class="muted">Todavía no hay remitos guardados.</div>';
          return;
        }

        contenedor.innerHTML = lista.map(remito => `
          <div class="recent-item">
            <div>
              <strong>Remito N° ${formatearNumeroRemito(remito.numero)}</strong><br>
              <span class="muted">${remito.clienteNombre || 'Sin cliente'} · ${formatearFecha(remito.fechaIso)}</span><br>
              <span class="${remito.estado === 'anulado' ? 'estado-anulado' : 'estado-activo'}">${remito.estado || 'activo'}</span>
            </div>
            <div>
              <button class="btn-secondary" onclick="cargarRemitoDesdeLista(${Number(remito.numero || 0)})">Ver</button>
            </div>
          </div>
        `).join('');
      });
    }

    function desactivarLecturas(){
      off(productosRef);
      off(remitosRef);
      listenerProductosActivo = false;
      listenerRemitosActivo = false;
      productos = [];
      limpiarVistaRemito();
    }

    async function login(){
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      mostrarErrorLogin('');
      try{
        await signInWithEmailAndPassword(auth, email, password);
      }catch(error){
        console.error(error);
        mostrarErrorLogin('Correo o contraseña incorrectos.');
      }
    }

    async function cerrarSesion(){
      try{
        await signOut(auth);
      }catch(error){
        console.error(error);
      }
    }

    onAuthStateChanged(auth, (user) => {
      const loginBox = document.getElementById('loginBox');
      const appBox = document.getElementById('app');

      if (user) {
        loginBox.style.display = 'none';
        appBox.style.display = 'block';
        cargarCarrito();
        renderCarrito();
        activarLecturaProductos();
        activarLecturaRemitos();
      } else {
        loginBox.style.display = 'block';
        appBox.style.display = 'none';
        desactivarLecturas();
      }
    });

    window.login = login;
    window.cerrarSesion = cerrarSesion;
    window.generarRemito = generarRemito;
    window.vaciarCarrito = vaciarCarrito;
    window.actualizarCantidadCarrito = actualizarCantidadCarrito;
    window.eliminarDelCarrito = eliminarDelCarrito;
    window.verRemito = verRemito;
    window.anularRemitoSeleccionado = anularRemitoSeleccionado;
    function emitirRemito(){
      window.location.href = "editaremito.html";
    }

    window.cargarRemitoDesdeLista = cargarRemitoDesdeLista;
    window.emitirRemito = emitirRemito;
  </script>
</body>
</html>
